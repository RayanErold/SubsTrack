kind = "web"
previewPath = "/"
title = "SubsTrack"
version = "1.0.0"
id = "artifacts/substrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19318

[services.development]
run = "pnpm --filter @workspace/substrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/substrack", "run", "build" ]
publicDir = "artifacts/substrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19318"
BASE_PATH = "/"
