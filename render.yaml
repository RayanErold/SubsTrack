services:
  # Backend Web Service
  - type: web
    name: substrack-api
    runtime: node
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile && pnpm build:backend
    startCommand: pnpm start:backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8081
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: substrack-ui
    runtime: static
    buildCommand: pnpm install --no-frozen-lockfile && pnpm build:frontend
    staticPublishPath: apps/frontend/dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        fromService:
          name: substrack-api
          type: web
          property: host
