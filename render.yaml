services:
  # Unified Full-Stack Service
  - type: web
    name: xsubscrips
    runtime: node
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile && pnpm build:frontend && pnpm build:backend
    startCommand: pnpm start:backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8081
      - key: BASE_PATH
        value: /
      # Backend Keys
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      # Frontend Keys (Used during build)
      - key: VITE_SUPABASE_URL
        fromService:
          type: web
          name: xsubscrips
          property: envVar
          key: SUPABASE_URL
      - key: VITE_SUPABASE_ANON_KEY
        fromService:
          type: web
          name: xsubscrips
          property: envVar
          key: SUPABASE_ANON_KEY
      - key: VITE_API_URL
        value: /api
